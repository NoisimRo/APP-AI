<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>
  <!-- Scale of justice (stylized) -->
  <g transform="translate(32,14)">
    <!-- Center pillar -->
    <rect x="-2" y="0" width="4" height="32" rx="2" fill="white" opacity="0.95"/>
    <!-- Base -->
    <rect x="-10" y="30" width="20" height="4" rx="2" fill="white" opacity="0.85"/>
    <!-- Balance beam -->
    <rect x="-20" y="-1" width="40" height="3.5" rx="1.75" fill="white" opacity="0.95"/>
    <!-- Left pan -->
    <line x1="-18" y1="2" x2="-14" y2="16" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="-18" y1="2" x2="-22" y2="16" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M-24,16 Q-18,22 -12,16" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Right pan -->
    <line x1="18" y1="2" x2="14" y2="12" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="18" y1="2" x2="22" y2="12" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M12,12 Q18,18 24,12" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>
  <!-- Data dots (representing BI/data aspect) -->
  <circle cx="10" cy="54" r="2" fill="white" opacity="0.4"/>
  <circle cx="16" cy="51" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="54" cy="54" r="2" fill="white" opacity="0.4"/>
  <circle cx="48" cy="51" r="1.5" fill="white" opacity="0.3"/>
</svg>
