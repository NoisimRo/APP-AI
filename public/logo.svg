<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Stylized scale of justice -->
  <g stroke="white" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Center pillar -->
    <line x1="32" y1="12" x2="32" y2="48" stroke-width="3.5"/>
    <!-- Base -->
    <line x1="22" y1="48" x2="42" y2="48" stroke-width="3.5"/>
    <!-- Beam (slightly tilted for dynamism) -->
    <line x1="12" y1="17" x2="52" y2="15" stroke-width="3.5"/>
    <!-- Left chain + pan -->
    <line x1="12" y1="17" x2="10" y2="30" stroke-width="2"/>
    <line x1="12" y1="17" x2="14" y2="30" stroke-width="2"/>
    <path d="M8,30 Q12,37 16,30" stroke-width="2.5"/>
    <!-- Right chain + pan -->
    <line x1="52" y1="15" x2="50" y2="26" stroke-width="2"/>
    <line x1="52" y1="15" x2="54" y2="26" stroke-width="2"/>
    <path d="M48,26 Q52,33 56,26" stroke-width="2.5"/>
  </g>
  <!-- Data bar chart accent (BI element) -->
  <rect x="24" y="38" width="3" height="8" rx="1" fill="white" opacity="0.35"/>
  <rect x="29" y="35" width="3" height="11" rx="1" fill="white" opacity="0.35"/>
  <rect x="34" y="37" width="3" height="9" rx="1" fill="white" opacity="0.35"/>
  <rect x="39" y="33" width="3" height="13" rx="1" fill="white" opacity="0.35"/>
</svg>
